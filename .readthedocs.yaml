version: 2

build:
  os: "ubuntu-24.04"
  tools:
    python: "latest"
  jobs:
    install:
      - pip install -r docs/_requirements.txt
      - pip install .
    build:
      html:
        - zensical build
    post_build:
      - mkdir -p $READTHEDOCS_OUTPUT/html/
      - cp -r site/* $READTHEDOCS_OUTPUT/html/
